<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quay 1 — Seller Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Login screen (shown until session exists) -->
  <div id="login" class="login hidden">
    <div class="login-card">
      <div class="brand-mark">
        <span class="dot"></span>
        <span class="name">Quay 1</span>
      </div>
      <h1>Seller Leads</h1>
      <p class="sub">Sign in with your clock-in username + PIN.<br>Superuser access only.</p>
      <form id="login-form">
        <label>Username
          <input id="login-user" type="text" autocomplete="username" placeholder="e.g. pagan" required>
        </label>
        <label>PIN
          <input id="login-pin" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn-primary">Sign in</button>
        <div id="login-error" class="error" hidden></div>
      </form>
    </div>
  </div>

  <!-- Main app shell -->
  <div id="app" class="app hidden">
    <header class="topnav">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Quay 1 · Seller Leads</span>
      </div>
      <nav class="tabs">
        <a href="#/overview"        data-tab="overview">Overview</a>
        <a href="#/sources"         data-tab="sources">Sources</a>
        <a href="#/pipeline"        data-tab="pipeline">Pipeline</a>
        <a href="#/action-tracker"  data-tab="action-tracker">Action Tracker</a>
        <a href="#/track"           data-tab="track">Track</a>
        <a href="#/raw-data"        data-tab="raw-data">Raw Data</a>
      </nav>
      <div class="user-chip">
        <span id="user-label" class="muted"></span>
        <button id="signout" class="btn-ghost">Sign out</button>
      </div>
    </header>

    <div class="body">
      <aside class="sidebar">
        <h3>Filters</h3>
        <div class="filter-group">
          <label>Date from
            <input type="date" id="f-from">
          </label>
          <label>Date to
            <input type="date" id="f-to">
          </label>
        </div>
        <details class="multi" id="ms-division">
          <summary>
            <span class="label">Division</span>
            <span class="summary-value">All</span>
            <span class="chev">▾</span>
          </summary>
          <div class="multi-body">
            <input type="text" class="multi-search" placeholder="search…" data-target="ms-division">
            <div class="multi-list" data-target="ms-division"></div>
          </div>
        </details>

        <details class="multi" id="ms-source">
          <summary>
            <span class="label">Source</span>
            <span class="summary-value">All</span>
            <span class="chev">▾</span>
          </summary>
          <div class="multi-body">
            <input type="text" class="multi-search" placeholder="search…" data-target="ms-source">
            <div class="multi-list" data-target="ms-source"></div>
          </div>
        </details>

        <details class="multi" id="ms-leadtype">
          <summary>
            <span class="label">Lead type</span>
            <span class="summary-value">All</span>
            <span class="chev">▾</span>
          </summary>
          <div class="multi-body">
            <div class="multi-list" data-target="ms-leadtype"></div>
          </div>
        </details>
        <div class="filter-group">
          <label class="row">
            <input type="checkbox" id="f-nodeal"> No deal yet only
          </label>
        </div>
        <div class="filter-group">
          <button id="f-reset" class="btn-ghost">Reset filters</button>
        </div>
        <div class="sidebar-foot muted small">
          <div id="sync-status">Loading…</div>
          <div class="refresh-row">
            <button id="refresh-now" class="btn-ghost refresh-btn" title="Trigger a fresh sync from sheet + HubSpot, then reload">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3.51-7.13"/><polyline points="21 4 21 12 13 12"/></svg>
              Refresh now
            </button>
            <button id="reload-data" class="btn-ghost refresh-btn" title="Re-pull from Supabase without a new sync (use after a sync finishes)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 12 5 10 7 12"/><path d="M5 10v6a4 4 0 0 0 4 4h8"/><polyline points="21 12 19 14 17 12"/><path d="M19 14V8a4 4 0 0 0-4-4H7"/></svg>
              Reload
            </button>
          </div>
        </div>
      </aside>

      <main id="view" class="view">
        <div class="loading">Loading…</div>
      </main>
    </div>
  </div>

  <!-- vendor -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <!-- Plotly basic: bar, scatter, pie — all charts in this app use these. ~830 KB vs 3.5 MB. -->
  <script defer src="https://cdn.plot.ly/plotly-basic-2.35.2.min.js"></script>

  <!-- app — all deferred so HTML parse isn't blocked; execution order preserved -->
  <script defer src="config.js"></script>
  <script defer src="utils.js"></script>
  <script defer src="theme.js"></script>
  <script defer src="data.js"></script>
  <script defer src="filters.js"></script>
  <script defer src="views/overview.js"></script>
  <script defer src="views/sources.js"></script>
  <script defer src="views/pipeline.js"></script>
  <script defer src="views/action_tracker.js"></script>
  <script defer src="views/track.js"></script>
  <script defer src="views/raw_data.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
